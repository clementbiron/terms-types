title: "Add: <here goes your type name>"
labels: ["New type"]
body:
- type: input
  id: name
  attributes:
    label: Type name
    description: What is the name of the terms type you would like to add?
    placeholder: Business Privacy Policy
  validations:
    required: true
- type: textarea
  id: alternative-type-names
  attributes:
    label: Alternative type names
    description: Suggest alternative names if you have any
    placeholder: "Example: Business Users Privacy Policy, Commercial Privacy Policy"
- type: input
  id: writer
  attributes:
    label: Writer
    description: The writer of the document, in most cases the service provider itself;
    placeholder: "Example: intermediation service provider"
- type: input
  id: audience
  attributes:
    label: Audience
    description: The targeted audience whose rights and duties are defined in the associated terms;
    placeholder: "Example: business user"
- type: input
  id: object
  attributes:
    label: Object
    description: The object of the commitment, i.e. the information or interaction whose handling will be constrained by the associated terms.
    placeholder: "Example: personal data of business users and of people acting on their behalf"
- type: textarea
  id: examples
  attributes:
    label: Examples
    description: |
      Provide examples of documents of this new terms type with the URL address from which the document can be accessed, the title of the document provided at this URL and the name of the service provider. For example:
      `Title: Corporate Business Contact Privacy Notice - URL: https://www.partners.skyscanner.net/privacy-policy - Service name: Skyscanner`
    placeholder: | 
      Title: ... - URL: ... - Service name: ...
- type: textarea
  id: references
  attributes:
    label: References
    description: What operating system are you using?
    placeholder: "Example: Open Terms Archive discussion: https://github.com/OpenTermsArchive/engine/discussions/923"
