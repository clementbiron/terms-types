title: "Add: <!-- here goes your type name -->"
labels: ["suggestion"]
body:
- type: input
  id: type-name
  attributes:
    label: Type name
    description: What is the name of the terms type you would like to add?
    placeholder: "Example: Privacy Policy"
  validations:
    required: true
- type: markdown
  attributes:
    value: "## Tryptich"
- type: input
  id: writer
  attributes:
    label: Writer
    description: the writer of the document, in most cases the service provider itself;
    placeholder: "Example: service provider"
- type: input
  id: audience
  attributes:
    label: Audience
    description: the targeted audience whose rights and duties are defined in the associated terms;
    placeholder: "Example: end user"
- type: input
  id: object
  attributes:
    label: Object
    description: the object of the commitment, i.e. the information or interaction whose handling will be constrained by the associated terms.
    placeholder: "Example: end user’s personal data"
- type: markdown
  attributes:
    value: "## Examples"
- type: markdown
  attributes:
    value: "## Naming"
- type: markdown
  attributes:
    value: "## References"
